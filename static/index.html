<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTG Deck Builder</title>
  <link rel="stylesheet" href="/css/theme.css" />
  <link rel="stylesheet" href="/css/layout.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/cards.css" />
</head>
<body>
  <div id="app">
    <!-- TOP PANEL (thin) — deck controls. Fleshed out in step 10. -->
    <header id="topbar">
      <div class="topbar-left">
        <span class="brand">MTG&nbsp;Deck&nbsp;Builder</span>
        <select id="deck-select" class="deck-select" aria-label="Select deck"></select>
        <button id="btn-new-deck" class="btn btn-accent"><span class="btn-ic"><svg viewBox="0 0 24 24"><rect x="4" y="2" width="14" height="20" rx="2" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M11 9v6M8 12h6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></span> New Deck</button>
      </div>
      <div class="topbar-center">
        <span id="deck-title" class="deck-title"></span>
        <span id="deck-commander" class="deck-commander"></span>
      </div>
      <div class="topbar-right">
        <span id="deck-count" class="deck-count" title="Cards in deck (Locked In + In)"></span>
        <span id="deck-price" class="deck-price" title="Total price of included cards"></span>
        <span id="save-indicator" class="save-indicator" aria-live="polite"></span>
        <button id="btn-save" class="btn"><span class="btn-ic"><svg viewBox="0 0 24 24"><path d="M5 3h11l3 3v15H5z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><rect x="8" y="3" width="7" height="5" fill="none" stroke="currentColor" stroke-width="1.6"/><rect x="7" y="13" width="10" height="7" fill="none" stroke="currentColor" stroke-width="1.6"/></svg></span> Save</button>
        <button id="btn-import" class="btn"><span class="btn-ic"><svg viewBox="0 0 24 24"><path d="M12 3v10m0 0l-4-4m4 4l4-4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 15v4a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span> Import</button>
        <button id="btn-export" class="btn"><span class="btn-ic"><svg viewBox="0 0 24 24"><path d="M12 13V3m0 0l-4 4m4-4l4 4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 15v4a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span> Export</button>
        <span class="tb-divider"></span>
        <button id="btn-tokens" class="btn" title="Tokens this deck needs"><span class="btn-ic"><svg viewBox="0 0 24 24"><circle cx="9" cy="9" r="6" fill="none" stroke="currentColor" stroke-width="1.6"/><circle cx="15" cy="15" r="6" fill="none" stroke="currentColor" stroke-width="1.6"/></svg></span> Tokens</button>
        <button id="btn-stats" class="btn"><span class="btn-ic"><svg viewBox="0 0 24 24"><rect x="4" y="14" width="4" height="7" fill="currentColor"/><rect x="10" y="9" width="4" height="12" fill="currentColor"/><rect x="16" y="4" width="4" height="17" fill="currentColor"/></svg></span> Stats</button>
        <button id="btn-playtest" class="btn btn-accent"><span class="btn-ic"><svg viewBox="0 0 24 24"><path d="M6 4l14 8-14 8z" fill="currentColor"/></svg></span> Playtest</button>
        <button id="btn-gear" class="btn btn-icon" title="More options">⚙</button>
      </div>
    </header>

    <!-- MAIN: full-width control bar on top, then a row of gallery body + drawer.
         The toolbar spans the full width and stays put; the drawer slides in
         UNDERNEATH it and shoves only the scrolling card body (R5 D1). -->
    <main id="main">
      <div id="gallery-toolbar" class="gallery-toolbar"></div>
      <div id="work-row">
        <section id="gallery" aria-label="Card gallery">
          <div id="gallery-body" class="gallery-body"></div>
        </section>

        <!-- Right drawer: shoves the gallery body, hidden by default. -->
        <aside id="drawer" class="drawer" aria-hidden="true">
        <div class="drawer-topbar">
          <div class="drawer-nav">
            <button id="drawer-prev" class="drawer-ctl" aria-label="Previous card" title="Previous card">&#9664;</button>
            <button id="drawer-next" class="drawer-ctl" aria-label="Next card" title="Next card">&#9654;</button>
          </div>
          <div class="drawer-controls">
            <button id="drawer-remove" class="drawer-ctl danger" aria-label="Remove card" title="Remove card from deck">🗑</button>
            <button id="drawer-help" class="drawer-ctl info" aria-label="Help" title="How types &amp; tags work">?</button>
            <button id="drawer-close" class="drawer-ctl" aria-label="Close">&times;</button>
          </div>
        </div>
        <div id="drawer-body" class="drawer-body"></div>
        </aside>
      </div>
    </main>

    <!-- Modals / popovers mount here. -->
    <div id="modal-root"></div>
  </div>

  <script src="/vendor/chart.min.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
